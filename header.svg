<svg fill="none" viewBox="0 0 600 382" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background-color: #1a1b26;
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
          color: #a9b1d6;
          height: 380px;
          border-radius: 6px;
          overflow: hidden;
          border: 1px solid #414868;
          margin: 1px;
          display: flex;
          flex-direction: column;
        }
        .window-header {
          background: #1f2335;
          padding: 8px 15px;
          display: flex;
          align-items: center;
          border-bottom: 1px solid #414868;
          flex-shrink: 0;
        }
        .buttons { display: flex; gap: 6px; width: 60px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #f7768e; }
        .yellow { background: #e0af68; }
        .green { background: #9ece6a; }
        .window-title { font-size: 11px; color: #565f89; flex-grow: 1; text-align: center; }
        .header-spacer { width: 60px; }

        .content { 
          padding: 20px 15px; 
          display: flex; 
          flex-direction: column; 
          gap: 20px; 
          flex-grow: 1;
        }
        
        .fastfetch { display: flex; flex-direction: row; gap: 20px; align-items: center; padding: 0 10px; }
        .ascii-art { color: #a9b1d6; font-size: 14px; line-height: 1.2; font-weight: bold; white-space: pre; }
        
        .sys-info { flex: 1; display: flex; flex-direction: column; gap: 4px; font-size: 11px; }
        .terminal-prompt { font-size: 13px; margin-bottom: 6px; }
        .command { color: #7aa2f7; }
        .accent { color: #bb9af7; }
        
        /* Progress Bar Styling */
        .bar-container { display: flex; align-items: center; gap: 10px; }
        .bar-bg { background: #24283b; height: 6px; border-radius: 3px; flex: 1; }
        .bar-fill { background: #7aa2f7; height: 100%; border-radius: 3px; }

        /* Discord Viewport */
        .discord-wrapper { display: flex; justify-content: center; margin-top: 10px; width: 100%; }
        .viewport {
          background: #16161e;
          border-radius: 8px;
          border: 1px solid #24283b;
          padding: 8px;
          display: flex;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
          width: 426px; /* 410px + 16px padding */
        }
        .live-card {
          width: 100%;
          border-radius: 4px;
        }
					
				.OS{
					color: #a9b1d6; 
					line-height: 1.4;
					padding: 0px 5px;
					}
        .footer-logs {
          padding: 10px 15px;
          font-size: 10px;
          color: #414868;
          display: flex;
          justify-content: space-between;
          border-top: 1px solid #24283b;
          margin-top: auto;
        }
      
        /* Bidirectional Typing Animation */
        .line {
          overflow: hidden;
          white-space: nowrap;
          width: 0;
        }

        @keyframes typing-in-out {
          0%, 5% { width: 0; }
          20%, 80% { width: 100%; }
          95%, 100% { width: 0; }
        }

        .line-1 { animation: typing-in-out 12s infinite; animation-delay: 0s; }
        .line-2 { animation: typing-in-out 12s infinite; animation-delay: 0.8s; }
        .line-3 { animation: typing-in-out 12s infinite; animation-delay: 1.6s; }

        .cursor {
          border-right: 2px solid #7aa2f7;
          animation: blink 0.7s infinite;
        }
        
        @keyframes blink { 50% { border-color: transparent } }

      </style>
      <div class="container">
        <div class="window-header">
          <div class="buttons">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="window-title">aldrin@frtzhahn: ~</div>
          <div class="header-spacer"></div>
        </div>

        <div class="content">
          <div class="fastfetch">
            <div class="ascii-art" style="display:flex; align-items:center; justify-content:center;">
              <img src="data:image/svg+xml;base64," width="120" />
            </div>
            
            <div class="sys-info">
              <div class="terminal-prompt">
                <span class="command">aldrin@frtzhahn:~$</span> fastfetch
              </div>
              <div class="bar-container">
                <span style="width: 80px; color: #7aa2f7;">will_to_code</span>
                <div class="bar-bg"><div class="bar-fill" style="width: 50%"></div></div>
                <span style="width: 25px; text-align: right;">50%</span>
              </div>
              <div class="bar-container">
                <span style="width: 80px; color: #bb9af7;">irl_age</span>
                <div class="bar-bg"><div class="bar-fill" style="width: 18%; background: #bb9af7;"></div></div>
                <span style="width: 25px; text-align: right;">18%</span>
              </div>
              <div class="bar-container">
                <span style="width: 80px; color: #bb9af7;">college_level</span>
                <div class="bar-bg"><div class="bar-fill" style="width: 25%; background: #f79acf;"></div></div>
                <span style="width: 25px; text-align: right;">25%</span>
              </div>
              <div style="color: #414868; margin: 4px 0;">-------------------------------------------------------------</div>
              <div class="OS">
                <span class="OS" style="color: #7aa2f7;">COURSE</span>: Bachelor of Science in Computer Science
								<br/>
                <span class="OS" style="color: #7aa2f7;">TRAITS</span>: Procrastinator, Crammer, Night Owl<br/>
              </div>
            </div>
          </div>
          <div class="window-content" style="padding: 0 10px; font-size: 14px; display: flex; flex-direction: column; margin-top: 18px;">
            <div><span class="command">aldrin@frtzhahn:~$</span> cat about_me.txt</div>
            <div style="margin-top: 10px; color: #9ece6a;">
              <div class="line line-1">&gt; Hello, I'm <span class="accent">Aldrin James A. Alciso</span></div>
              <div class="line line-2">&gt; Student at <span class="accent">University of Caloocan City</span></div>
              <div class="line line-3">&gt; Exploring new things everyday :3</div>
            </div>
            <div style="margin-top: 15px;">
              <span class="command">aldrin@frtzhahn:~$</span> <span class="cursor">_</span>
            </div>
          </div>
        </div>

        <div class="footer-logs">
          <span>LOGS: monitoring pid 1476</span>
          <span class="accent">"STATUS: EN_COURS"</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
