<svg fill="none" viewBox="0 0 520 185" width="100%" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; padding: 0; }
        .card {
          background: #1a1b26;
          border: 1px solid #414868;
          border-radius: 8px;
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
          color: #a9b1d6;
          width: 518px;
          height: 183px;
          overflow: hidden;
          display: flex;
          flex-direction: column;
        }
        .titlebar {
          background: #1f2335;
          border-bottom: 1px solid #414868;
          padding: 7px 14px;
          display: flex;
          align-items: center;
          gap: 6px;
          flex-shrink: 0;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .r { background: #f7768e; }
        .y { background: #e0af68; }
        .g { background: #9ece6a; }
        .win-title { flex: 1; text-align: center; font-size: 11px; color: #565f89; }
        .body { padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .status { font-size: 10px; letter-spacing: 1.5px; color: #565f89; }
        .track  { font-size: 15px; font-weight: bold; color: #c0caf5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { font-size: 11px; color: #7aa2f7; }
        .album  { font-size: 10px; color: #565f89; }
        .prog-section { margin-top: 8px; }
        .bar-wrap {
          width: 100%;
          height: 4px;
          background: #292e42;
          border-radius: 4px;
          margin-bottom: 5px;
          position: relative;
          overflow: hidden;
        }
        .bar-fill {
          height: 100%;
          width: 0%;
          background: linear-gradient(90deg, #7aa2f7, #bb9af7);
          border-radius: 4px;
        }
        .times-row {
          display: flex;
          justify-content: space-between;
          font-size: 9px;
          color: #414868;
          margin-bottom: 6px;
        }
        .controls-row {
          display: flex;
          align-items: center;
          gap: 14px;
          font-size: 13px;
          color: #565f89;
        }
        .play { color: #bb9af7; font-size: 14px; }
        .vol { color: #414868; font-size: 10px; margin-left: auto; }
      </style>
      <div class="card">
        <div class="titlebar">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
          <span class="win-title">bash — ncmpcpp</span>
        </div>
        <div class="body">
          <div class="status">◌ LAST PLAYED</div>
          <div class="track">resonance - midwest emo version - slowed + reverb</div>
          <div class="artist">♩ jacal</div>
          <div class="album">⬡ resonance - midwest emo version (slowed + reverb)</div>
          <div class="prog-section">
            <div class="bar-wrap"><div class="bar-fill"></div></div>
            <div class="times-row"><span>0:00</span><span>4:05</span></div>
            <div class="controls-row">
              <span>⏮</span>
              <span class="play">▐▐</span>
              <span>⏭</span>
              <span>⇌</span>
              <span class="vol">vol: ████████░░ 80%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>