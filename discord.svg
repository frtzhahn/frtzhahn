<svg fill="none" viewBox="0 0 800 350" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background-color: #1a1b26;
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
          color: #a9b1d6;
          height: 330px;
          border-radius: 6px;
          overflow: hidden;
          border: 1px solid #414868;
          display: flex;
          flex-direction: column;
        }
        .window-header {
          background: #1f2335;
          padding: 8px 15px;
          display: flex;
          align-items: center;
          border-bottom: 1px solid #414868;
          flex-shrink: 0;
        }
        .buttons { display: flex; gap: 6px; width: 60px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #f7768e; }
        .yellow { background: #e0af68; }
        .green { background: #9ece6a; }
        .window-title { font-size: 11px; color: #565f89; flex-grow: 1; text-align: center; }
        .header-spacer { width: 60px; }

        .content { 
          padding: 15px; 
          display: flex; 
          flex-direction: row; 
          gap: 20px; 
          flex-grow: 1;
        }
        
        /* Left Column: Terminal Prompt and Logs */
        .left-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .terminal-prompt { font-size: 13px; }
        .command { color: #7aa2f7; }
        .accent { color: #bb9af7; }
        
        .sys-info {
          font-size: 11px;
          color: #565f89;
          background: #16161e;
          padding: 10px;
          border-radius: 4px;
          border-left: 2px solid #7aa2f7;
        }
        
        /* Progress Bar Styling */
        .bar-container { margin-top: 5px; }
        .bar-label { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .bar-bg { background: #24283b; height: 4px; border-radius: 2px; }
        .bar-fill { background: #7aa2f7; height: 100%; border-radius: 2px; }

        /* Right Column: Live Presence Viewport */
        .right-col { width: 320px; flex-shrink: 0; }
        .viewport {
          background: #16161e;
          border-radius: 8px;
          border: 1px solid #24283b;
          padding: 8px;
          display: flex;
          justify-content: center;
          align-items: center;
          overflow: hidden;
          box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        .live-card {
          width: 100%;
          border-radius: 4px;
        }

        .footer-logs {
          padding: 10px 15px;
          font-size: 10px;
          color: #414868;
          display: flex;
          justify-content: space-between;
          border-top: 1px solid #24283b;
          margin-top: auto;
        }

        @media (max-width: 500px) {
          .content { flex-direction: column; gap: 10px; }
          .container { height: auto; min-height: 520px; }
          .right-col { width: 100%; }
          .window-title { font-size: 9px; }
        }
      </style>
      <div class="container">
        <div class="window-header">
          <div class="buttons">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="window-title">systemctl --user status aldrin-presence.service</div>
          <div class="header-spacer"></div>
        </div>

        <div class="content">
          <div class="left-col">
            <div class="terminal-prompt">
              <span class="command">aldrin@frtzhahn:~$</span> fetch --sys-metrics
            </div>
            
            <div class="sys-info">
              <div class="bar-container">
                <div class="bar-label"><span>will_to_code</span><span>50%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 50%"></div></div>
              </div>
              <div class="bar-container" style="margin-top: 8px;">
                <div class="bar-label"><span>brain_power</span><span>67%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width: 67%; background: #bb9af7;"></div></div>
              </div>
              <div style="margin-top: 15px;">
                &gt; OS: CachyOS Linux x86_64<br/>
                &gt; KERNEL: Linux 7.0.5-2-cachyos<br/>
              </div>
            </div>

            <div style="font-size: 11px; color: #7aa2f7; margin-top: 5px;">
              [ OK ] Started Discord Monitor..<br/>
              [ OK ] Syncing Lanyard stream...
            </div>
          </div>

          <div class="right-col">
            <div class="viewport">
              <img class="live-card" src="https://lanyard.cnrad.dev/api/1476532337499177012?theme=dark&amp;bg=16161e&amp;hideActivity=false&amp;borderRadius=5px" alt="Live Discord Status" />
            </div>
          </div>
        </div>

        <div class="footer-logs">
          <span>LOGS: monitoring pid 1476</span>
          <span class="accent">NODE_ENV: production</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
