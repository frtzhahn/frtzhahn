<svg fill="none" viewBox="0 0 600 736" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background-color: #1a1b26;
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
          color: #a9b1d6;
          height: 716px;
          border-radius: 6px;
          overflow: hidden;
          border: 1px solid #414868;
          display: flex;
          flex-direction: column;
        }
        .window-header {
          background: #1f2335;
          padding: 8px 15px;
          display: flex;
          align-items: center;
          border-bottom: 1px solid #414868;
          flex-shrink: 0;
        }
        .buttons { display: flex; gap: 6px; width: 60px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #f7768e; }
        .yellow { background: #e0af68; }
        .green { background: #9ece6a; }
        .window-title { font-size: 11px; color: #565f89; flex-grow: 1; text-align: center; }
        .header-spacer { width: 60px; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        
        .section-label { 
          color: #565f89; font-size: 15px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; 
          display: block; border-bottom: 1px solid #24283b; padding-bottom: 2px;
          overflow: hidden; white-space: nowrap; max-width: 0; width: max-content;
          border-right: 2px solid transparent;
          animation: type-section 15s infinite;
        }
        @keyframes type-section {
          0%, 5% { max-width: 0; border-right-color: transparent; }
          6% { border-right-color: #bb9af7; }
          20%, 85% { max-width: 600px; border-right-color: transparent; }
          86% { border-right-color: #bb9af7; }
          95%, 100% { max-width: 0; border-right-color: transparent; }
        }
        
        .bar-row { 
          display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 11px; 
          opacity: 0;
          animation: fade-row 15s infinite forwards;
        }
        @keyframes fade-row {
          0%, 10% { opacity: 0; transform: translateX(-10px); }
          20%, 85% { opacity: 1; transform: translateX(0); }
          95%, 100% { opacity: 0; transform: translateX(10px); }
        }
        .bar-row:nth-child(1) { animation-delay: 0.1s; }
        .bar-row:nth-child(2) { animation-delay: 0.3s; }
        .bar-row:nth-child(3) { animation-delay: 0.5s; }
        .bar-row:nth-child(4) { animation-delay: 0.7s; }
        .bar-row:nth-child(5) { animation-delay: 0.9s; }
        .bar-row:nth-child(6) { animation-delay: 1.1s; }
        .bar-row:nth-child(7) { animation-delay: 1.3s; }
        .bar-row:nth-child(8) { animation-delay: 1.5s; }
        .bar-row:nth-child(n+9) { animation-delay: 1.7s; }

        .bar-name { min-width: 70px; color: #7aa2f7; }
        .bar-bg { flex-grow: 1; background: #24283b; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { 
          height: 100%; border-radius: 4px; 
          transform-origin: left;
          animation: fill-bar 15s infinite;
        }
        @keyframes fill-bar {
          0%, 15% { transform: scaleX(0); }
          30%, 80% { transform: scaleX(1); }
          95%, 100% { transform: scaleX(0); }
        }
        .bar-val { min-width: 35px; text-align: right; color: #a9b1d6; }

        .list-container { display: flex; flex-direction: column; gap: 12px; }
        .stat-group { display: flex; flex-direction: column; gap: 4px; }
        .stat-item { 
          color: #a9b1d6; font-size: 12px; padding-left: 10px; border-left: 2px solid #24283b; 
          overflow: hidden; white-space: nowrap; max-width: 0; width: max-content;
          border-right: 2px solid transparent;
          animation: type-stat 15s infinite forwards;
        }
        @keyframes type-stat {
          0%, 10% { max-width: 0; border-right-color: transparent; }
          11% { border-right-color: #7aa2f7; }
          30%, 80% { max-width: 400px; border-right-color: transparent; }
          81% { border-right-color: #7aa2f7; }
          90%, 100% { max-width: 0; border-right-color: transparent; }
        }
        .stat-item:nth-child(1) { animation-delay: 0.1s; }
        .stat-item:nth-child(2) { animation-delay: 0.5s; }
        .stat-item:nth-child(3) { animation-delay: 0.9s; }
        .stat-item:nth-child(4) { animation-delay: 1.3s; }
        .stat-item:nth-child(5) { animation-delay: 1.7s; }
        .stat-item:nth-child(6) { animation-delay: 2.1s; }
        .stat-item:nth-child(7) { animation-delay: 2.5s; }
        .stat-item:nth-child(8) { animation-delay: 2.9s; }
        .stat-item:nth-child(n+9) { animation-delay: 3.3s; }
        
        .accent { color: #bb9af7; }
        .cyan { color: #73daca; }
        .green-text { color: #9ece6a; }
        .blue { color: #7aa2f7; }

        @media (max-width: 480px) {
          .section-label { font-size: 12px; }
          .bar-name { min-width: 50px; font-size: 10px; }
          .stat-item { font-size: 10px; }
          .window-title { font-size: 9px; }
          .container { height: auto; min-height: 716px; }
        }
      </style>
      <div class="container">
        <div class="window-header">
          <div class="buttons">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="window-title">htop --frtzhahn@aldrin coding-stats</div>
          <div class="header-spacer"></div>
        </div>

        <div class="content">
          <div class="section">
            <span class="section-label">Top Languages</span>
            <div id="lang-bars">
              <!-- LANG_START -->
              <div class="bar-row"><span class="bar-name">Lua</span><div class="bar-bg"><div class="bar-fill" style="width: 45.1%; background: #7aa2f7;"></div></div><span class="bar-val">45.1%</span></div>
              <div class="bar-row"><span class="bar-name">Markdown</span><div class="bar-bg"><div class="bar-fill" style="width: 40.0%; background: #7aa2f7;"></div></div><span class="bar-val">40.0%</span></div>
              <div class="bar-row"><span class="bar-name">C</span><div class="bar-bg"><div class="bar-fill" style="width: 7.6%; background: #7aa2f7;"></div></div><span class="bar-val">7.6%</span></div>
              <div class="bar-row"><span class="bar-name">Bash</span><div class="bar-bg"><div class="bar-fill" style="width: 3.8%; background: #7aa2f7;"></div></div><span class="bar-val">3.8%</span></div>
              <div class="bar-row"><span class="bar-name">conf</span><div class="bar-bg"><div class="bar-fill" style="width: 1.7%; background: #7aa2f7;"></div></div><span class="bar-val">1.7%</span></div>
              <div class="bar-row"><span class="bar-name">JavaScript</span><div class="bar-bg"><div class="bar-fill" style="width: 0.7%; background: #7aa2f7;"></div></div><span class="bar-val">0.7%</span></div>
              <div class="bar-row"><span class="bar-name">JSON</span><div class="bar-bg"><div class="bar-fill" style="width: 0.6%; background: #7aa2f7;"></div></div><span class="bar-val">0.6%</span></div>
              <div class="bar-row"><span class="bar-name">gitconfig</span><div class="bar-bg"><div class="bar-fill" style="width: 0.2%; background: #7aa2f7;"></div></div><span class="bar-val">0.2%</span></div>
              <div class="bar-row"><span class="bar-name">XML</span><div class="bar-bg"><div class="bar-fill" style="width: 0.1%; background: #7aa2f7;"></div></div><span class="bar-val">0.1%</span></div>
              <div class="bar-row"><span class="bar-name">Other</span><div class="bar-bg"><div class="bar-fill" style="width: 0.1%; background: #7aa2f7;"></div></div><span class="bar-val">0.1%</span></div>
              <!-- LANG_END -->
            </div>
          </div>

          <div class="list-container">
            <div class="stat-group">
              <span class="section-label">Active Editors</span>
              <div id="editor-list">
                <!-- EDITORS_START -->
                <div class="stat-item">● Neovim</div>
                <div class="stat-item">● Obsidian</div>
                <!-- EDITORS_END -->
              </div>
            </div>

            <div class="stat-group">
              <span class="section-label">Current Projects</span>
              <div id="project-list" class="cyan">
                <!-- PROJECTS_START -->
                <div class="stat-item">● Unknown Project</div>
                <div class="stat-item">● amoeba</div>
                <div class="stat-item">● C-programming</div>
                <div class="stat-item">● nvim-config</div>
                <div class="stat-item">● Javascript-practice</div>
                <div class="stat-item">● frtzhahn</div>
                <div class="stat-item">● RandFacts</div>
                <div class="stat-item">● home</div>
                <!-- PROJECTS_END -->
              </div>
            </div>

            <div class="stat-group">
              <span class="section-label">Operating Systems</span>
              <div id="os-list">
                <!-- OS_START -->
                <div class="stat-item">● Linux</div>
                <div class="stat-item">● Android</div>
                <!-- OS_END -->
              </div>
            </div>

            <div class="stat-group">
              <span class="section-label">aldrin@frtzhahn performance</span>
              <div class="stat-item"><span class="blue">TIME:</span> <span id="stat-time">3 hrs 17 mins total</span></div>
              <div class="stat-item"><span class="green-text">DAILY AVG:</span> <span id="stat-avg">39 mins / day</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
