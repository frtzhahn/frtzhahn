name: Update Riced Stats

on:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch WakaTime Data
        id: waka
        run: |
          # Fetch raw stats from WakaTime
          STATS=$(curl -s -u "${{ secrets.WAKATIME_API_KEY }}": https://wakatime.com/api/v1/users/current/stats/last_7_days)
          
          # Extract values using jq
          TIME=$(echo "$STATS" | jq -r '.data.human_readable_total_including_other_language')
          
          # Update simple text fields in wakatime.svg
          sed -i "s|<span id=\"stat-time\">[^<]*</span>|<span id=\"stat-time\">$TIME total</span>|g" wakatime.svg
          
          # Extract and Format Editors
          EDITORS=$(echo "$STATS" | jq -r '.data.editors[:4] | map("                <div class=\"stat-item\">● " + .name + "</div>") | join("\n")')
          perl -0777 -pi -e "s|(<div id=\"editor-list\">).*?(              </div>)|\$1\n$EDITORS\n\$2|gs" wakatime.svg

          # Extract and Format Projects
          PROJECTS=$(echo "$STATS" | jq -r '.data.projects[:4] | map("                <div class=\"stat-item\">● " + .name + "</div>") | join("\n")')
          perl -0777 -pi -e "s|(<div id=\"project-list\" class=\"cyan\">).*?(              </div>)|\$1\n$PROJECTS\n\$2|gs" wakatime.svg

          # Extract and Format OS
          OSS=$(echo "$STATS" | jq -r '.data.operating_systems[:4] | map("                <div class=\"stat-item\">● " + .name + "</div>") | join("\n")')
          perl -0777 -pi -e "s|(<div id=\"os-list\">).*?(              </div>)|\$1\n$OSS\n\$2|gs" wakatime.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime.svg
          git commit -m "docs: update wakatime stats dashboard [skip ci]" || exit 0
          git push
