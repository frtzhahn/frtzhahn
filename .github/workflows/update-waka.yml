name: Update Riced Stats

on:
  schedule:
    - cron: "0 0 * * *" # Every day at midnight
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fetch and Update WakaTime Data
        id: waka
        run: |
          curl -s -u "${{ secrets.WAKATIME_API_KEY }}": \
            https://wakatime.com/api/v1/users/current/stats/last_7_days > stats.json

          # Validate API response
          python3 -c "
import json, sys
d = json.load(open('stats.json'))
if 'data' not in d:
    print('API error:', d, file=sys.stderr)
    sys.exit(1)
print('API OK:', len(d['data'].get('languages', [])), 'languages')
"
          # Run the SVG update script (no inline quote-escaping issues)
          python3 .github/scripts/update_waka_svg.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wakatime.svg
          git commit -m "docs: dynamic wakatime stats dashboard update [skip ci]" || exit 0
          git push
