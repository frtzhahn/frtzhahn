name: Update Discord Status

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch and Embed Lanyard Image
        run: |
          # Download the SVG image from Lanyard
          LANYARD_URL="https://lanyard.cnrad.dev/api/1476532337499177012?theme=dark&bg=16161e&hideActivity=false&borderRadius=5px"
          curl -s "$LANYARD_URL" > lanyard.svg
          
          # Fix Lanyard's invalid viewBox that contains "px" (e.g. viewBox="0 0 410px 210")
          sed -i 's/viewBox="0 0 \([0-9]*\)px/viewBox="0 0 \1/g' lanyard.svg
          
          # Use Python to embed the base64 image to avoid shell argument length limits
          python3 -c "
          import base64
          import re
          
          with open('lanyard.svg', 'rb') as f:
              raw_svg = f.read().decode('utf-8')
              
          # Aggressively strip alt and title attributes to prevent layout breaking on broken images
          raw_svg = re.sub(r'alt="[^"]*"', '', raw_svg)
          raw_svg = re.sub(r'title="[^"]*"', '', raw_svg)
          
          b64_img = base64.b64encode(raw_svg.encode('utf-8')).decode()
          
          with open('discord.svg', 'r') as f:
              content = f.read()
          
          content = re.sub(
              r'(<img class=\"live-card\" src=\").*?(\" />)',
              rf'\g<1>data:image/svg+xml;base64,{b64_img}\g<2>',
              content,
              flags=re.DOTALL
          )
          
          with open('discord.svg', 'w') as f:
              f.write(content)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add discord.svg
          git commit -m "docs: update discord.service status [skip ci]" || exit 0
          git push
