name: Update Discord Status

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch and Embed Lanyard Image
        run: |
          # Download the SVG image from Lanyard
          LANYARD_URL="https://lanyard.cnrad.dev/api/1476532337499177012?theme=dark&bg=16161e&hideActivity=false&borderRadius=5px"
          B64_IMG=$(curl -s "$LANYARD_URL" | base64 -w 0)
          
          # Inject the base64 image directly into discord.svg
          perl -0777 -pi -e "s|(<img class=\"live-card\" src=\").*?(\" alt=\"Live Discord Status\" />)|\$1data:image/svg+xml;base64,$B64_IMG\$2|gs" discord.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add discord.svg
          git commit -m "docs: update discord.service status [skip ci]" || exit 0
          git push
